<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Incident Management Dashboard</title>
      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
      <style>
         body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
         .container { max-width: 1200px; margin: auto; }
         /* Header & Timestamp */
         .header { text-align: center; margin-bottom: 30px; }
         .timestamp { font-size: 0.9rem; color: #666; background: #eee; padding: 5px 15px; border-radius: 20px; display: inline-block; margin-top: 10px; }
         /* KPI Cards */
         .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
         .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-top: 5px solid #ddd; }
         .card h3 { margin: 0; font-size: 0.85rem; color: #888; text-transform: uppercase; }
         .card p { margin: 10px 0 0; font-size: 2rem; font-weight: bold; }
         /* Coloring */
         .total { border-top-color: #34495e; }
         .open { border-top-color: #e74c3c; }
         .progress { border-top-color: #f1c40f; }
         .resolved { border-top-color: #2ecc71; }
         /* Area for charts */
         .charts-grid {
         display: grid;
         grid-template-columns: 2fr 1fr; 
         gap: 20px;
         margin-bottom: 30px;
         align-items: stretch;
         }
         .chart-box {
         background: white;
         padding: 20px;
         border-radius: 12px;
         box-shadow: 0 4px 6px rgba(0,0,0,0.05);
         height: 400px;
         display: flex;
         flex-direction: column;
         align-items: center; 
         justify-content: center;
         position: relative;
         }
         .chart-box canvas {
         max-width: 100% !important;
         max-height: 100% !important;
         }
         .chart-box canvas {
         max-height: 100% !important;
         max-width: 100% !important;
         }
         /* Table Style */
         .table-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto; }
         table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
         th { background: #f8f9fa; color: #666; text-align: left; padding: 12px; border-bottom: 2px solid #eee; }
         td { padding: 12px; border-bottom: 1px solid #eee; }
         tr:hover { background-color: #fcfcfc; }
         .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
         .bg-low { background: #d5f5e3; color: #1d8348; }
         .bg-medium { background: #fef9e7; color: #9a7d0a; }
         .bg-high { background: #fadbd8; color: #943126; }
         @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
      </style>
   </head>
   <body>
      <div class="container">
         <div class="header">
            <h1>Incident Dashboard System</h1>
            <div id="last-updated" class="timestamp">Last Updated: --:--</div>
         </div>
         <div class="metrics-grid">
            <div class="card total">
               <h3>Total</h3>
               <p id="total-val">0</p>
            </div>
            <div class="card open">
               <h3>Open</h3>
               <p id="open-val">0</p>
            </div>
            <div class="card progress">
               <h3>In Progress</h3>
               <p id="progress-val">0</p>
            </div>
            <div class="card resolved">
               <h3>Resolved</h3>
               <p id="resolved-val">0</p>
            </div>
         </div>
         <div class="charts-grid">
            <div class="chart-box">
               <canvas id="categoryChart"></canvas>
            </div>
            <div class="chart-box">
               <canvas id="priorityChart"></canvas>
            </div>
         </div>
         <div class="table-container">
            <h2 style="margin-top:0">Recent Incident Records</h2>
            <table>
               <thead>
                  <tr>
                     <th>ID</th>
                     <th>Date</th>
                     <th>Category</th>
                     <th>Suburb</th>
                     <th>Priority</th>
                     <th>Status</th>
                  </tr>
               </thead>
               <tbody id="incident-table-body">
               </tbody>
            </table>
         </div>
      </div>
      <script>
         async function initDashboard() {
             try {
                 const res = await fetch('./data/summary.json');
                 const data = await res.json();
         
                 // 1. Update Metrics
                 document.getElementById('total-val').innerText = data.metrics.totalIncidents;
                 document.getElementById('open-val').innerText = data.metrics.openIncidents;
                 document.getElementById('progress-val').innerText = data.metrics.inProgressIncidents;
                 document.getElementById('resolved-val').innerText = data.metrics.resolvedIncidents;
                 document.getElementById('last-updated').innerText = `Last Updated: ${new Date(data.lastUpdated).toLocaleString('en-GB')}`;
         
                 // 2. Category Chart (Bar Chart)
                 new Chart(document.getElementById('categoryChart'), {
                     type: 'bar',
                     data: {
                         labels: data.byCategory.map(c => c.category),
                         datasets: [{
                             label: 'Incidents by Category',
                             data: data.byCategory.map(c => c.count),
                             backgroundColor: '#3498db'
                         }]
                     },
                     options: { plugins: { title: { display: true, text: 'Incidents by Category' } } }
                 });
         
                 // 3. Priority Chart 
         new Chart(document.getElementById('priorityChart'), {
         type: 'doughnut',
         data: {
             labels: data.byPriority.map(p => p.category),
             datasets: [{
                 data: data.byPriority.map(p => p.count),
                 backgroundColor: ['#2ecc71', '#e74c3c', '#f1c40f']
             }]
         },
         options: {
             responsive: true,
             maintainAspectRatio: false, 
             plugins: {
                 legend: {
                     position: 'top', 
                 },
                 title: {
                     display: true,
                     text: 'Incidents by Priority'
                 }
             }
         }
         });
         
                 // 4. Populate Table
                 const tableBody = document.getElementById('incident-table-body');
                 data.recentRecords.slice(0, 10).forEach(rec => { // Show top 10
                     const row = `<tr>
                         <td><b>${rec.incident_id}</b></td>
                         <td>${rec.reported_date}</td>
                         <td>${rec.category}</td>
                         <td>${rec.suburb}</td>
                         <td><span class="badge bg-${rec.priority.toLowerCase()}">${rec.priority}</span></td>
                         <td>${rec.status}</td>
                     </tr>`;
                     tableBody.innerHTML += row;
                 });
         
             } catch (e) { console.error("Error loading JSON", e); }
         }
         
         window.onload = initDashboard;
      </script>
   </body>
</html>
